name: e_commerce
description: "A new Flutter project."
publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.11.0


dependencies:
  flutter:
    sdk: flutter


  cupertino_icons: ^1.0.8
  equatable: ^2.0.8
  flutter_bloc: ^9.1.1
  retrofit: ^4.9.2
  logger: ^2.6.0
  dio: ^5.7.0
  json_annotation: ^4.9.0
  get_it: ^9.2.0
  injectable: ^2.7.1
  google_fonts: ^8.0.2
  flutter_screenutil: ^5.9.0
  bloc: ^9.2.0
  flutter_secure_storage: ^10.0.0
  flutter_svg: ^2.2.4
  cached_network_image: ^3.4.1
  pinput: ^6.0.2
  google_nav_bar: ^5.0.7
  test: ^1.29.0
  mockito: ^5.6.4
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  injectable_generator: ^2.9.1
  retrofit_generator: ^10.2.3
  build_runner: ^2.12.2
  json_serializable: ^6.11.2



flutter:


  uses-material-design: true

  assets:
    - assets/images/
    


  fonts:
    - family: Podkova
      fonts:
        - asset: assets/fonts/Podkova/static/Podkova-Regular.ttf
        - asset: assets/fonts/Podkova/static/Podkova-Bold.ttf
